    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#fefce8',
                100: '#fef9c3',
                500: '#eab308', // Gold/Yellow for opportunity
                600: '#ca8a04',
                700: '#a16207',
              },
              action: {
                400: '#FF914D', // Lighter orange for focus/highlight
                500: '#FF6600', // Base: Vibrant Conversion Orange (Updated)
                600: '#E65C00', // Hover: Deep vibrant orange
                700: '#CC4900', // Active: Intense orange
              }
            },
            animation: {
              'pulse-action': 'pulse-action 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'pulse-action': {
                '0%, 100%': { 
                  backgroundColor: '#FF6600', 
                  transform: 'scale(1)', 
                  boxShadow: '0 4px 6px -1px rgba(255, 102, 0, 0.4), 0 2px 4px -1px rgba(255, 102, 0, 0.2)' 
                },
                '50%': { 
                  backgroundColor: '#FF8533', // Pulses to lighter orange
                  transform: 'scale(1.03)', 
                  boxShadow: '0 20px 25px -5px rgba(255, 102, 0, 0.5), 0 10px 10px -5px rgba(255, 102, 0, 0.3)' 
                },
              }
            }
          }
        }
      }
    </script>
